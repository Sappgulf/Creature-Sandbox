<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Sleek aquatic body -->
  <ellipse cx="40" cy="50" rx="35" ry="20" fill="currentColor" filter="url(#shadow)" />
  <!-- Streamlined eye -->
  <ellipse cx="58" cy="45" rx="6" ry="5" fill="white" />
  <ellipse cx="60" cy="45" rx="3" ry="2.5" fill="black" />
  <!-- Fins -->
  <path d="M35,38 L28,28 L30,40 Z" fill="currentColor" opacity="0.7" />
  <path d="M35,62 L28,72 L30,60 Z" fill="currentColor" opacity="0.7" />
  <!-- Tail fin -->
  <path d="M10,50 L2,40 L5,50 L2,60 Z" fill="currentColor" opacity="0.8" />
  <!-- Wave lines for aquatic feel -->
  <path d="M45,48 Q50,46 55,48" stroke="white" stroke-width="1" fill="none" opacity="0.3" />
  <path d="M45,52 Q50,54 55,52" stroke="white" stroke-width="1" fill="none" opacity="0.3" />
</svg>
