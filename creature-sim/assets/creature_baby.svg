<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" />
      <feOffset dx="0.5" dy="0.5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Smaller body for baby -->
  <ellipse cx="47" cy="52" rx="22" ry="18" fill="currentColor" filter="url(#shadow)" />
  <!-- Big cute eyes -->
  <circle cx="54" cy="46" r="5" fill="white" />
  <circle cx="55" cy="46" r="2.5" fill="black" />
  <circle cx="54" cy="44" r="1.2" fill="white" />
  <!-- Rosy cheeks -->
  <circle cx="56" cy="54" r="4" fill="#ff9999" opacity="0.5" />
  <circle cx="38" cy="54" r="4" fill="#ff9999" opacity="0.5" />
  <!-- Tiny tail -->
  <path d="M28,52 Q22,50 25,52 Q22,54 28,52" fill="currentColor" opacity="0.6" />
</svg>
