<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Body - balanced shape -->
  <ellipse cx="45" cy="50" rx="28" ry="22" fill="currentColor" filter="url(#shadow)" />
  <!-- Eye -->
  <circle cx="58" cy="43" r="6" fill="white" />
  <circle cx="60" cy="43" r="3" fill="black" />
  <circle cx="59" cy="41" r="1.5" fill="white" />
  <!-- Small fin -->
  <path d="M22,50 Q15,48 18,50 Q15,52 22,50" fill="currentColor" opacity="0.6" />
</svg>
