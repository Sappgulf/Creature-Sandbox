<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Larger, more mature body -->
  <ellipse cx="42" cy="50" rx="32" ry="26" fill="currentColor" filter="url(#shadow)" />
  <!-- Wise, aged eye -->
  <ellipse cx="53" cy="42" rx="5" ry="4" fill="white" />
  <ellipse cx="54" cy="42" rx="2.5" ry="2" fill="black" />
  <circle cx="53" cy="40" r="1" fill="white" />
  <!-- Age lines/wrinkles -->
  <path d="M52,48 Q54,49 56,48" stroke="currentColor" stroke-width="0.5" fill="none" opacity="0.4" />
  <path d="M50,51 Q52,52 54,51" stroke="currentColor" stroke-width="0.5" fill="none" opacity="0.4" />
  <!-- Graying effect on edges -->
  <ellipse cx="42" cy="50" rx="32" ry="26" fill="none" stroke="white" stroke-width="1" opacity="0.15" />
  <!-- Smaller tail (less energy) -->
  <path d="M15,50 Q8,49 12,50 Q8,51 15,50" fill="currentColor" opacity="0.5" />
</svg>
