<svg xmlns="http://www.w3.org/2000/svg" width="768" height="96" viewBox="0 0 768 96" fill="none">
<!-- Flowers and grass for environmental decoration -->

<!-- FLOWER 0: Red Tulip -->
<g transform="translate(0 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Stem -->
<path d="M 16 90 Q 14 70 16 50" stroke="#4caf50" stroke-width="3" fill="none"/>
<!-- Leaf -->
<path d="M 16 75 Q 8 70 6 65 Q 12 68 16 75 Z" fill="#388e3c"/>
<!-- Tulip flower -->
<path d="M 16 50 Q 6 40 8 30 Q 12 35 16 32 Q 20 35 24 30 Q 26 40 16 50 Z" fill="#e53935"/>
<path d="M 16 48 Q 10 40 12 32" stroke="#c62828" stroke-width="1" fill="none"/>
</g>

<!-- FLOWER 1: Yellow Sunflower -->
<g transform="translate(96 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Stem -->
<path d="M 48 90 Q 46 65 48 45" stroke="#4caf50" stroke-width="4" fill="none"/>
<!-- Leaves -->
<path d="M 48 70 Q 38 65 34 58 Q 42 62 48 70 Z" fill="#388e3c"/>
<path d="M 48 60 Q 58 54 64 48 Q 56 54 48 60 Z" fill="#2e7d32"/>
<!-- Petals -->
<ellipse cx="48" cy="32" rx="6" ry="12" fill="#fdd835"/>
<ellipse cx="48" cy="32" rx="6" ry="12" fill="#fdd835" transform="rotate(45 48 32)"/>
<ellipse cx="48" cy="32" rx="6" ry="12" fill="#fdd835" transform="rotate(90 48 32)"/>
<ellipse cx="48" cy="32" rx="6" ry="12" fill="#fdd835" transform="rotate(135 48 32)"/>
<!-- Center -->
<circle cx="48" cy="32" r="8" fill="#5d4037"/>
<circle cx="48" cy="32" r="6" fill="#6d4c41"/>
</g>

<!-- FLOWER 2: Blue Flower -->
<g transform="translate(192 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Stem -->
<path d="M 24 90 Q 22 70 24 55" stroke="#4caf50" stroke-width="2.5" fill="none"/>
<!-- Leaf -->
<path d="M 24 78 Q 18 74 16 68 Q 22 72 24 78 Z" fill="#388e3c"/>
<!-- Petals -->
<circle cx="24" cy="48" r="6" fill="#1e88e5"/>
<circle cx="18" cy="42" r="5" fill="#42a5f5"/>
<circle cx="30" cy="42" r="5" fill="#42a5f5"/>
<circle cx="18" cy="54" r="5" fill="#42a5f5"/>
<circle cx="30" cy="54" r="5" fill="#42a5f5"/>
<circle cx="24" cy="48" r="4" fill="#bbdefb"/>
</g>

<!-- FLOWER 3: White Daisy -->
<g transform="translate(288 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Stem -->
<path d="M 48 90 Q 50 65 48 45" stroke="#4caf50" stroke-width="2.5" fill="none"/>
<!-- Leaves -->
<path d="M 48 72 Q 40 68 38 62 Q 44 66 48 72 Z" fill="#388e3c"/>
<path d="M 48 62 Q 56 58 60 52 Q 54 58 48 62 Z" fill="#2e7d32"/>
<!-- Petals -->
<ellipse cx="48" cy="32" rx="4" ry="10" fill="#ffffff"/>
<ellipse cx="48" cy="32" rx="4" ry="10" fill="#ffffff" transform="rotate(30 48 32)"/>
<ellipse cx="48" cy="32" rx="4" ry="10" fill="#ffffff" transform="rotate(60 48 32)"/>
<ellipse cx="48" cy="32" rx="4" ry="10" fill="#ffffff" transform="rotate(90 48 32)"/>
<ellipse cx="48" cy="32" rx="4" ry="10" fill="#ffffff" transform="rotate(120 48 32)"/>
<ellipse cx="48" cy="32" rx="4" ry="10" fill="#ffffff" transform="rotate(150 48 32)"/>
<!-- Center -->
<circle cx="48" cy="32" r="7" fill="#fdd835"/>
<circle cx="48" cy="32" r="5" fill="#fbc02d"/>
</g>

<!-- FLOWER 4: Purple Lavender -->
<g transform="translate(384 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Stems -->
<path d="M 30 90 Q 28 65 30 45" stroke="#4caf50" stroke-width="2" fill="none"/>
<path d="M 38 90 Q 36 68 38 50" stroke="#4caf50" stroke-width="2" fill="none"/>
<path d="M 46 90 Q 44 70 46 55" stroke="#4caf50" stroke-width="2" fill="none"/>
<path d="M 54 90 Q 52 68 54 48" stroke="#4caf50" stroke-width="2" fill="none"/>
<path d="M 62 90 Q 60 65 62 42" stroke="#4caf50" stroke-width="2" fill="none"/>
<!-- Lavender buds -->
<ellipse cx="30" cy="42" rx="4" ry="6" fill="#7b1fa2"/>
<ellipse cx="30" cy="38" rx="3" ry="4" fill="#9c27b0"/>
<ellipse cx="38" cy="48" rx="4" ry="6" fill="#7b1fa2"/>
<ellipse cx="38" cy="44" rx="3" ry="4" fill="#9c27b0"/>
<ellipse cx="46" cy="52" rx="4" ry="6" fill="#7b1fa2"/>
<ellipse cx="46" cy="48" rx="3" ry="4" fill="#9c27b0"/>
<ellipse cx="54" cy="46" rx="4" ry="6" fill="#7b1fa2"/>
<ellipse cx="54" cy="42" rx="3" ry="4" fill="#9c27b0"/>
<ellipse cx="62" cy="40" rx="4" ry="6" fill="#7b1fa2"/>
<ellipse cx="62" cy="36" rx="3" ry="4" fill="#9c27b0"/>
</g>

<!-- FLOWER 5: Pink Wildflower -->
<g transform="translate(480 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Multiple stems -->
<path d="M 20 90 Q 18 70 20 50" stroke="#4caf50" stroke-width="2" fill="none"/>
<path d="M 30 90 Q 32 72 30 55" stroke="#4caf50" stroke-width="2" fill="none"/>
<path d="M 42 90 Q 40 68 42 48" stroke="#4caf50" stroke-width="2" fill="none"/>
<!-- Flowers -->
<circle cx="20" cy="46" r="6" fill="#ec407a"/>
<circle cx="20" cy="46" r="4" fill="#f48fb1"/>
<circle cx="30" cy="51" r="5" fill="#ec407a"/>
<circle cx="30" cy="51" r="3" fill="#f48fb1"/>
<circle cx="42" cy="44" r="6" fill="#ec407a"/>
<circle cx="42" cy="44" r="4" fill="#f48fb1"/>
</g>

<!-- GRASS 0: Tall Grass -->
<g transform="translate(576 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Multiple grass blades -->
<path d="M 20 90 Q 18 70 22 50 Q 20 60 20 90" fill="#4caf50"/>
<path d="M 28 90 Q 32 65 26 45 Q 30 58 28 90" fill="#388e3c"/>
<path d="M 36 90 Q 34 72 38 52 Q 36 65 36 90" fill="#43a047"/>
<path d="M 44 90 Q 48 68 42 48 Q 46 62 44 90" fill="#2e7d32"/>
<path d="M 52 90 Q 50 70 54 50 Q 52 63 52 90" fill="#4caf50"/>
<path d="M 60 90 Q 64 65 58 45 Q 62 58 60 90" fill="#388e3c"/>
<path d="M 70 90 Q 68 72 72 52 Q 70 65 70 90" fill="#43a047"/>
<path d="M 78 90 Q 82 68 76 48 Q 80 62 78 90" fill="#2e7d32"/>
</g>

<!-- GRASS 1: Short Grass Patch -->
<g transform="translate(672 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Dense grass patch -->
<path d="M 16 90 Q 14 80 18 70 Q 16 78 16 90" fill="#4caf50"/>
<path d="M 24 90 Q 22 82 26 72 Q 24 80 24 90" fill="#388e3c"/>
<path d="M 32 90 Q 34 78 30 68 Q 32 76 32 90" fill="#43a047"/>
<path d="M 40 90 Q 38 80 42 70 Q 40 78 40 90" fill="#2e7d32"/>
<path d="M 48 90 Q 50 78 46 68 Q 48 76 48 90" fill="#4caf50"/>
<path d="M 56 90 Q 54 80 58 70 Q 56 78 56 90" fill="#388e3c"/>
<path d="M 64 90 Q 66 82 62 72 Q 64 80 64 90" fill="#43a047"/>
<path d="M 72 90 Q 70 78 74 68 Q 72 76 72 90" fill="#2e7d32"/>
<path d="M 80 90 Q 82 80 78 70 Q 80 78 80 90" fill="#4caf50"/>
</g>
</svg>