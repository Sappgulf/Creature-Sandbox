<svg xmlns="http://www.w3.org/2000/svg" width="768" height="96" viewBox="0 0 768 96" fill="none">
<!-- Trees and plants for environmental decoration -->

<!-- TREE 0: Forest Oak -->
<g transform="translate(0 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Trunk -->
<rect x="42" y="50" width="12" height="40" fill="#5d4037"/>
<rect x="44" y="52" width="3" height="36" fill="#6d4c41" opacity="0.5"/>
<!-- Foliage layers -->
<ellipse cx="48" cy="38" rx="32" ry="28" fill="#2e7d32"/>
<ellipse cx="48" cy="32" rx="26" ry="22" fill="#388e3c"/>
<ellipse cx="48" cy="28" rx="20" ry="16" fill="#43a047"/>
<ellipse cx="48" cy="24" rx="14" ry="12" fill="#4caf50"/>
</g>

<!-- TREE 1: Pine Tree -->
<g transform="translate(96 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Trunk -->
<rect x="44" y="60" width="8" height="30" fill="#5d4037"/>
<!-- Layered pine foliage -->
<path d="M 48 10 L 72 45 L 60 45 L 76 65 L 56 65 L 76 90 L 20 90 L 40 65 L 20 65 L 36 45 L 24 45 Z" fill="#1b5e20"/>
<path d="M 48 10 L 66 38 L 56 38 L 70 58 L 52 58 L 68 80 L 28 80 L 44 58 L 26 58 L 38 38 L 30 38 Z" fill="#2e7d32"/>
</g>

<!-- TREE 2: Autumn Tree -->
<g transform="translate(192 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Trunk -->
<rect x="42" y="55" width="12" height="35" fill="#5d4037"/>
<rect x="44" y="57" width="3" height="31" fill="#6d4c41" opacity="0.5"/>
<!-- Orange/red foliage -->
<ellipse cx="48" cy="38" rx="30" ry="26" fill="#bf360c"/>
<ellipse cx="48" cy="32" rx="24" ry="20" fill="#d84315"/>
<ellipse cx="48" cy="28" rx="18" ry="14" fill="#e64a19"/>
<ellipse cx="42" cy="24" rx="10" ry="8" fill="#ff7043"/>
<ellipse cx="54" cy="30" rx="8" ry="7" fill="#ff8a65"/>
</g>

<!-- TREE 3: Small Bush -->
<g transform="translate(288 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Bush -->
<ellipse cx="48" cy="65" rx="28" ry="18" fill="#2e7d32"/>
<ellipse cx="48" cy="60" rx="22" ry="14" fill="#388e3c"/>
<ellipse cx="48" cy="56" rx="16" ry="10" fill="#43a047"/>
<!-- Berries -->
<circle cx="38" cy="58" r="3" fill="#c62828"/>
<circle cx="52" cy="54" r="2.5" fill="#c62828"/>
<circle cx="58" cy="62" r="2" fill="#c62828"/>
<circle cx="42" cy="66" r="2" fill="#c62828"/>
</g>

<!-- TREE 4: Winter/Pine -->
<g transform="translate(384 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Snow-covered trunk -->
<rect x="44" y="55" width="8" height="35" fill="#4e342e"/>
<!-- Snow on trunk top -->
<rect x="42" y="52" width="12" height="5" fill="#eceff1" rx="2"/>
<!-- Snow-covered pine -->
<path d="M 48 8 L 70 40 L 58 40 L 74 58 L 54 58 L 74 82 L 22 82 L 42 58 L 22 58 L 38 40 L 26 40 Z" fill="#37474f"/>
<!-- Snow on branches -->
<ellipse cx="48" cy="20" rx="16" ry="6" fill="#eceff1"/>
<ellipse cx="56" cy="38" rx="12" ry="5" fill="#eceff1"/>
<ellipse cx="38" cy="55" rx="10" ry="4" fill="#eceff1"/>
</g>

<!-- TREE 5: Sakura/Cherry Blossom -->
<g transform="translate(480 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Trunk -->
<rect x="44" y="55" width="8" height="35" fill="#5d4037"/>
<!-- Pink blossom layers -->
<ellipse cx="48" cy="40" rx="30" ry="26" fill="#f8bbd9"/>
<ellipse cx="48" cy="34" rx="24" ry="20" fill="#f48fb1"/>
<ellipse cx="48" cy="30" rx="18" ry="14" fill="#f06292"/>
<ellipse cx="40" cy="26" rx="10" ry="8" fill="#ffffff" opacity="0.6"/>
<ellipse cx="56" cy="32" rx="8" ry="7" fill="#ffffff" opacity="0.5"/>
<ellipse cx="48" cy="22" rx="6" ry="5" fill="#ffffff" opacity="0.4"/>
</g>

<!-- TREE 6: Dead/Autumn Bare Tree -->
<g transform="translate(576 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Trunk -->
<rect x="44" y="50" width="8" height="40" fill="#5d4037"/>
<!-- Bare branches -->
<path d="M 48 50 Q 30 40 20 30" stroke="#5d4037" stroke-width="4" fill="none"/>
<path d="M 48 50 Q 66 38 78 28" stroke="#5d4037" stroke-width="4" fill="none"/>
<path d="M 48 45 Q 35 35 28 38" stroke="#5d4037" stroke-width="3" fill="none"/>
<path d="M 48 45 Q 62 32 72 35" stroke="#5d4037" stroke-width="3" fill="none"/>
<path d="M 48 55 Q 38 50 30 52" stroke="#5d4037" stroke-width="2.5" fill="none"/>
<path d="M 48 55 Q 58 48 68 50" stroke="#5d4037" stroke-width="2.5" fill="none"/>
<!-- Remaining leaves -->
<circle cx="22" cy="28" r="4" fill="#ff7043"/>
<circle cx="74" cy="26" r="3" fill="#ff7043"/>
<circle cx="30" cy="50" r="3" fill="#ffa726"/>
</g>

<!-- TREE 7: Palm Tree -->
<g transform="translate(672 0)">
<rect x="0" y="0" width="96" height="96" fill="none"/>
<!-- Trunk (curved) -->
<path d="M 48 90 Q 50 70 48 50 Q 46 30 48 15" stroke="#8d6e63" stroke-width="8" fill="none"/>
<path d="M 48 90 Q 50 70 48 50 Q 46 30 48 15" stroke="#a1887f" stroke-width="4" fill="none"/>
<!-- Palm fronds -->
<path d="M 48 15 Q 20 5 5 20" stroke="#388e3c" stroke-width="3" fill="none"/>
<path d="M 48 15 Q 76 5 91 20" stroke="#388e3c" stroke-width="3" fill="none"/>
<path d="M 48 15 Q 25 15 10 30" stroke="#2e7d32" stroke-width="3" fill="none"/>
<path d="M 48 15 Q 71 15 86 30" stroke="#2e7d32" stroke-width="3" fill="none"/>
<path d="M 48 15 Q 48 -5 50 -10" stroke="#388e3c" stroke-width="3" fill="none"/>
<path d="M 48 15 Q 30 10 20 5" stroke="#43a047" stroke-width="2" fill="none"/>
<path d="M 48 15 Q 66 10 76 5" stroke="#43a047" stroke-width="2" fill="none"/>
</g>
</svg>