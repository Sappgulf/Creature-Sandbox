<svg xmlns="http://www.w3.org/2000/svg" width="512" height="64" viewBox="0 0 512 64" fill="none">
<!-- Particle sprites: sparkles, hearts, dust, effects -->

<!-- SPARKLE 0: 4-pointed star sparkle -->
<g transform="translate(0 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<path d="M 16 2 L 18 12 L 28 14 L 18 16 L 16 26 L 14 16 L 4 14 L 14 12 Z" fill="#ffffff"/>
<path d="M 16 6 L 17 13 L 24 14 L 17 15 L 16 22 L 15 15 L 8 14 L 15 13 Z" fill="#fff9c4" opacity="0.8"/>
</g>

<!-- SPARKLE 1: Round sparkle with glow -->
<g transform="translate(32 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<circle cx="16" cy="16" r="10" fill="#ffffff" opacity="0.3"/>
<circle cx="16" cy="16" r="6" fill="#ffffff" opacity="0.6"/>
<circle cx="16" cy="16" r="3" fill="#ffffff"/>
</g>

<!-- SPARKLE 2: Diamond sparkle -->
<g transform="translate(64 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<path d="M 16 4 L 24 16 L 16 28 L 8 16 Z" fill="#ffffff"/>
<path d="M 16 8 L 20 16 L 16 24 L 12 16 Z" fill="#e1f5fe" opacity="0.7"/>
</g>

<!-- SPARKLE 3: Cross sparkle -->
<g transform="translate(96 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<rect x="14" y="4" width="4" height="24" fill="#ffffff" opacity="0.9"/>
<rect x="4" y="14" width="24" height="4" fill="#ffffff" opacity="0.9"/>
<rect x="14" y="8" width="4" height="16" fill="#fff9c4" opacity="0.6"/>
<rect x="8" y="14" width="16" height="4" fill="#fff9c4" opacity="0.6"/>
</g>

<!-- HEART 0: Classic heart -->
<g transform="translate(128 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<path d="M 16 28 Q 6 20 6 12 Q 6 6 12 6 Q 16 6 16 10 Q 16 6 20 6 Q 26 6 26 12 Q 26 20 16 28 Z" fill="#e91e63"/>
<path d="M 16 26 Q 8 19 8 12 Q 8 8 12 8 Q 15 8 16 11" fill="#f48fb1" opacity="0.5"/>
</g>

<!-- HEART 1: Small heart -->
<g transform="translate(160 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<path d="M 16 24 Q 10 18 10 13 Q 10 9 13 9 Q 15 9 16 11 Q 17 9 19 9 Q 22 9 22 13 Q 22 18 16 24 Z" fill="#e91e63"/>
<path d="M 16 22 Q 12 17 12 13 Q 12 11 14 11" fill="#f48fb1" opacity="0.4"/>
</g>

<!-- HEART 2: Bouncy heart (wobble animation frames) -->
<g transform="translate(192 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<path d="M 16 26 Q 8 20 8 14 Q 8 10 12 10 Q 15 10 16 12 Q 17 10 20 10 Q 24 10 24 14 Q 24 20 16 26 Z" fill="#ec407a"/>
<ellipse cx="12" cy="14" rx="2" ry="1.5" fill="#f8bbd9" opacity="0.6"/>
</g>

<!-- DUST 0: Dust cloud puff -->
<g transform="translate(224 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<circle cx="10" cy="20" r="6" fill="#8d6e63" opacity="0.6"/>
<circle cx="16" cy="16" r="8" fill="#a1887f" opacity="0.5"/>
<circle cx="22" cy="18" r="6" fill="#8d6e63" opacity="0.6"/>
<circle cx="14" cy="12" r="4" fill="#bcaaa4" opacity="0.4"/>
<circle cx="20" cy="12" r="3" fill="#bcaaa4" opacity="0.3"/>
</g>

<!-- DUST 1: Dirt particles -->
<g transform="translate(256 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<circle cx="8" cy="24" r="3" fill="#5d4037" opacity="0.7"/>
<circle cx="14" cy="20" r="2" fill="#6d4c41" opacity="0.6"/>
<circle cx="20" cy="22" r="2.5" fill="#5d4037" opacity="0.7"/>
<circle cx="24" cy="18" r="2" fill="#6d4c41" opacity="0.5"/>
<circle cx="16" cy="14" r="1.5" fill="#795548" opacity="0.4"/>
</g>

<!-- DUST 2: Smoke puff -->
<g transform="translate(288 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<circle cx="12" cy="18" r="7" fill="#78909c" opacity="0.4"/>
<circle cx="18" cy="14" r="8" fill="#90a4ae" opacity="0.3"/>
<circle cx="16" cy="22" r="6" fill="#78909c" opacity="0.35"/>
<circle cx="22" cy="18" r="5" fill="#90a4ae" opacity="0.25"/>
</g>

<!-- BURST 0: Star burst effect -->
<g transform="translate(320 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<path d="M 16 4 L 17 13 L 26 10 L 18 16 L 28 16 L 18 18 L 26 22 L 17 19 L 16 28 L 15 19 L 6 22 L 14 18 L 4 16 L 14 16 L 6 10 L 15 13 Z" fill="#ffd54f"/>
<path d="M 16 8 L 17 14 L 22 12 L 18 16 L 24 16 L 18 18 L 22 22 L 17 20 L 16 26 L 15 20 L 10 22 L 14 18 L 8 16 L 14 16 L 10 12 L 15 14 Z" fill="#fff59d" opacity="0.8"/>
</g>

<!-- BURST 1: Circular burst -->
<g transform="translate(352 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<circle cx="16" cy="16" r="12" fill="none" stroke="#ffd54f" stroke-width="2"/>
<circle cx="16" cy="16" r="8" fill="none" stroke="#fff59d" stroke-width="2"/>
<circle cx="16" cy="16" r="4" fill="#ffd54f"/>
</g>

<!-- RING 0: Expanding ring -->
<g transform="translate(384 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<circle cx="16" cy="16" r="12" fill="none" stroke="#81d4fa" stroke-width="2" opacity="0.8"/>
</g>

<!-- RING 1: Solid ring -->
<g transform="translate(416 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<circle cx="16" cy="16" r="10" fill="none" stroke="#e1f5fe" stroke-width="3" opacity="0.7"/>
<circle cx="16" cy="16" r="6" fill="#ffffff" opacity="0.3"/>
</g>

<!-- ZZZ 0: Sleep Z particles -->
<g transform="translate(448 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<text x="8" y="20" font-family="Arial" font-size="16" font-weight="bold" fill="#90caf9">Z</text>
</g>

<!-- ZZZ 1: Larger Z -->
<g transform="translate(480 0)">
<rect x="0" y="0" width="32" height="32" fill="none"/>
<text x="6" y="24" font-family="Arial" font-size="20" font-weight="bold" fill="#64b5f6">Z</text>
</g>
</svg>