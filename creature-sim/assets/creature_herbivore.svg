<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Body -->
  <ellipse cx="45" cy="50" rx="30" ry="25" fill="currentColor" filter="url(#shadow)" />
  <!-- Cute cheeks -->
  <circle cx="55" cy="55" r="5" fill="#ff9999" opacity="0.4" />
  <circle cx="35" cy="55" r="5" fill="#ff9999" opacity="0.4" />
  <!-- Eye -->
  <circle cx="55" cy="42" r="6" fill="white" />
  <circle cx="57" cy="42" r="3" fill="black" />
  <circle cx="56" cy="40" r="1.5" fill="white" />
  <!-- Tail -->
  <path d="M20,50 Q10,45 15,50 Q10,55 20,50" fill="currentColor" opacity="0.7" />
</svg>
