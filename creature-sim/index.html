<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AI Creature Sandbox</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="hud">
    <button id="btn-pause">Pause</button>
    <button id="btn-step">Step</button>
    <button id="btn-spawn-food">+ Food</button>
    <button id="btn-spawn-herb">+ Herbivore</button>
    <button id="btn-spawn-pred">+ Predator</button>
    <span id="stats"></span>
  </div>

  <div id="inspector">
    <div class="title-row">
      <div class="title">Inspector</div>
      <div class="title-actions">
        <button id="btn-pin" class="chip">Pin</button>
        <button id="btn-root" class="chip">Set Root</button>
        <button id="btn-close-inspector" class="chip ghost" title="Hide inspector">Hide</button>
      </div>
    </div>
    <div id="inspector-body">
      <div class="muted">Click a creature to inspect.<br/>Shift-click to set lineage root.</div>
    </div>
    <div id="badges-panel" class="section hidden"></div>
    <div id="lineage-panel" class="section">
      <div class="section-title">Lineage</div>
      <div id="lineage-summary" class="muted">Shift-click a creature to pick a lineage root.</div>
    </div>
    <div id="lineage-story" class="section hidden">
      <div class="section-title">Lineage Stories</div>
      <div id="lineage-stories" class="muted">No milestones yet.</div>
    </div>
    <div id="activity-panel" class="section">
      <div class="section-title">Recent Activity</div>
      <div id="activity-feed" class="muted">No activity yet.</div>
    </div>
    <div id="behavior-panel" class="section">
      <div class="section-title">Behavior Weights</div>
      <label class="slider-row">Forage<input type="range" id="slider-forage" min="0" max="2" step="0.05" value="1"/></label>
      <label class="slider-row">Wander<input type="range" id="slider-wander" min="0" max="2" step="0.05" value="1"/></label>
      <label class="slider-row">Rest<input type="range" id="slider-rest" min="0" max="2" step="0.05" value="0.6"/></label>
    </div>
    <div id="analytics-panel" class="section">
      <div class="section-title">
        <span>Evolution Analytics</span>
        <button id="btn-export" class="chip">Export</button>
      </div>
      <div class="chart-block">
        <canvas id="chart-pop" width="240" height="80"></canvas>
        <label>Population / Predators</label>
      </div>
      <div class="chart-block">
        <canvas id="chart-speed" width="240" height="80"></canvas>
        <label>Mean Speed</label>
      </div>
      <div class="chart-block">
        <canvas id="chart-metabolism" width="240" height="80"></canvas>
        <label>Mean Metabolism</label>
      </div>
      <div class="chart-block">
        <canvas id="chart-variance" width="240" height="80"></canvas>
        <label>Speed / Sense Variance</label>
      </div>
      <div class="chart-block">
        <canvas id="chart-ratio" width="240" height="80"></canvas>
        <label>Predator Ratio</label>
      </div>
    </div>
  </div>

  <canvas id="view" width="1000" height="700"></canvas>
  <button id="btn-show-inspector" class="chip floating hidden" title="Show inspector">Show Panel</button>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
