<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AI Creature Sandbox</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="hud">
    <button id="btn-pause">Pause</button>
    <button id="btn-step">Step</button>
    <button id="btn-spawn-food">+ Food</button>
    <button id="btn-spawn-pred">+ Predator</button>
    <span id="stats"></span>
  </div>

  <div id="inspector">
    <div class="title">Inspector</div>
    <div id="inspector-body">
      <div class="muted">Click a creature to inspect.<br/>Shift-click to set lineage root.</div>
    </div>
  </div>

  <canvas id="view" width="1000" height="700"></canvas>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
